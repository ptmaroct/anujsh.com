[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "22"

# Normalize /blog (no trailing slash) -> /blog/
[[redirects]]
  from = "/blog"
  to = "/blog/"
  status = 301
  force = true

# Normalize /blog/<slug> (no trailing slash) -> /blog/<slug>/
[[redirects]]
  from = "/blog/:slug"
  to = "/blog/:slug/"
  status = 301
  force = false
